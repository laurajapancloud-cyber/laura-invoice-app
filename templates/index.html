<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAURA JAPAN | Invoice System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#111; --accent:#6366f1; --bg:#f0f2f5; --card:#fff; --border:#e5e7eb; --muted:#6b7280; --red:#ef4444; --green:#10b981; --blue:#3b82f6; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Inter','Noto Sans JP',sans-serif; background:var(--bg); color:var(--primary); min-height:100vh; }
        .app-header { background:linear-gradient(135deg,#111 0%,#1e1b4b 100%); color:#fff; padding:20px 24px 0; text-align:center; }
        .logo { font-size:24px; font-weight:800; letter-spacing:.3em; margin-bottom:4px; }
        .logo-sub { font-size:11px; color:rgba(255,255,255,.5); letter-spacing:.15em; margin-bottom:16px; }
        .tabs { display:flex; gap:0; }
        .tab { flex:1; padding:12px; font-size:13px; font-weight:600; color:rgba(255,255,255,.5); cursor:pointer; border-bottom:3px solid transparent; transition:all .2s; }
        .tab.active { color:#fff; border-bottom-color:var(--accent); }
        .tab:hover { color:rgba(255,255,255,.8); }
        .page { max-width:600px; margin:0 auto; padding:20px 16px 40px; display:none; }
        .page.active { display:block; animation:fadeIn .3s; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .card { background:var(--card); border-radius:16px; padding:24px; margin-bottom:16px; box-shadow:0 4px 12px rgba(0,0,0,.04); }
        .card-title { font-size:14px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .form-row { display:flex; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
        .form-group { flex:1; min-width:120px; }
        .form-group label { display:block; font-size:11px; color:var(--muted); font-weight:600; margin-bottom:4px; }
        .form-group input, .form-group select { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-family:inherit; background:#fff; }
        .form-group select { appearance:auto; }
        .upload-area { border:2px dashed var(--border); border-radius:12px; padding:40px 20px; cursor:pointer; text-align:center; transition:all .2s; background:#fafafa; }
        .upload-area:active { background:#f0f0f0; border-color:var(--muted); }
        .upload-icon { font-size:36px; margin-bottom:12px; }
        .upload-text { font-size:14px; font-weight:600; }
        .upload-sub { font-size:11px; color:var(--muted); margin-top:4px; }
        #file-input { display:none; }
        .thumb-row { display:flex; gap:10px; overflow-x:auto; padding:12px 0; }
        .thumb-item { position:relative; flex-shrink:0; }
        .thumb-img { height:80px; width:60px; object-fit:cover; border-radius:6px; border:1px solid var(--border); }
        .thumb-x { position:absolute; top:-6px; right:-6px; background:#111; color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .btn { width:100%; padding:14px; font-size:15px; font-weight:600; border:none; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all .15s; margin-bottom:10px; color:#fff; }
        .btn:disabled { opacity:.4; cursor:not-allowed; }
        .btn-dark { background:#111; }
        .btn-accent { background:var(--accent); }
        .btn-red { background:var(--red); }
        .btn-green { background:var(--green); }
        .btn-blue { background:var(--blue); }
        .btn-sm { padding:8px 14px; font-size:12px; width:auto; margin:0; border-radius:6px; }
        .progress-wrap { margin:16px 0; }
        .progress-bar { width:100%; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
        .progress-fill { height:100%; background:var(--accent); width:0%; transition:width .3s; }
        .progress-label { font-size:11px; color:var(--muted); margin-top:4px; display:flex; justify-content:space-between; }
        .toast { padding:10px 14px; border-radius:8px; font-size:13px; margin-top:12px; display:none; }
        .toast-info { background:#eff6ff; color:var(--blue); }
        .toast-ok { background:#d1fae5; color:var(--green); }
        .toast-err { background:#fee2e2; color:var(--red); }
        /* Item Card Preview */
        .item-cards { display:flex; flex-direction:column; gap:12px; }
        .item-card { background:#fafbfc; border:1px solid var(--border); border-radius:14px; padding:16px; position:relative; transition:box-shadow .2s,transform .15s; }
        .item-card:active { transform:scale(0.985); }
        .item-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .item-card-num { font-size:11px; font-weight:700; color:var(--accent); background:rgba(99,102,241,.08); padding:3px 10px; border-radius:20px; }
        .item-card-del { background:none; border:none; color:var(--red); font-size:20px; cursor:pointer; padding:4px 8px; border-radius:8px; transition:background .15s; }
        .item-card-del:active { background:rgba(239,68,68,.1); }
        .item-card-body { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .item-field { display:flex; flex-direction:column; gap:3px; }
        .item-field.full { grid-column:1/-1; }
        .item-field label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
        .item-field input { padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:15px; font-family:inherit; background:#fff; transition:border-color .15s,box-shadow .15s; -webkit-appearance:none; }
        .item-field input:focus { border-color:var(--accent); outline:none; box-shadow:0 0 0 3px rgba(99,102,241,.12); }
        .item-field input[type=number] { text-align:right; }
        .item-card-footer { margin-top:12px; padding-top:10px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .item-card-price { font-size:11px; color:var(--muted); }
        .item-card-total { font-size:16px; font-weight:800; color:var(--accent); }
        .preview-summary { background:linear-gradient(135deg,#1e1b4b,#312e81); color:#fff; border-radius:14px; padding:18px; margin-top:16px; }
        .preview-summary-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:13px; }
        .preview-summary-row.total { font-size:18px; font-weight:800; padding-top:10px; margin-top:8px; border-top:1px solid rgba(255,255,255,.2); }
        .del-btn { background:none; border:none; color:var(--red); font-size:18px; cursor:pointer; padding:4px 8px; }
        .hist-item { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--border); gap:12px; }
        .hist-item:last-child { border-bottom:none; }
        .hist-info { text-align:left; flex:1; min-width:0; }
        .hist-num { font-size:14px; font-weight:700; }
        .hist-meta { font-size:11px; color:var(--muted); margin-top:2px; }
        .hist-amt { font-size:16px; font-weight:800; color:var(--accent); white-space:nowrap; }
        .hist-actions { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
        .cust-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
        .cust-item:last-child { border-bottom:none; }
        .empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }
        .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,.3); border-top:2px solid #fff; border-radius:50%; animation:spin .8s linear infinite; display:none; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
        .stat-box { background:#fafafa; border-radius:12px; padding:16px; text-align:center; }
        .stat-val { font-size:24px; font-weight:800; color:var(--accent); }
        .stat-label { font-size:11px; color:var(--muted); margin-top:4px; }
        .bar-chart { display:flex; align-items:flex-end; gap:8px; height:120px; padding:8px 0; }
        .bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
        .bar { width:100%; background:var(--accent); border-radius:4px 4px 0 0; min-height:4px; transition:height .5s; }
        .bar-label { font-size:10px; color:var(--muted); }
        .usage-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
        .usage-row:last-child { border:none; }
        .share-btns { display:flex; gap:8px; margin-top:12px; }
        .share-btns .btn { flex:1; font-size:13px; padding:10px; }
        @keyframes cardIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .item-card { animation:cardIn .25s ease-out; }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="logo">LAURA JAPAN</div>
        <div class="logo-sub">INVOICE & DATA MANAGEMENT</div>
        <div class="tabs">
            <div class="tab active" data-tab="create">✍️ 新規</div>
            <div class="tab" data-tab="history">📂 履歴</div>
            <div class="tab" data-tab="dashboard">📊 分析</div>
            <div class="tab" data-tab="settings">⚙️ 設定</div>
        </div>
    </div>

    <!-- ========== TAB 1: CREATE ========== -->
    <div class="page active" id="page-create">
        <div class="card">
            <div class="card-title">⚙️ 伝票設定</div>
            <div class="form-row">
                <div class="form-group"><label>取引先</label><select id="sel-customer"><option value="">読込中...</option></select></div>
                <div class="form-group" style="max-width:80px"><label>掛率(%)</label><input type="number" id="inp-rate" value="35" min="1" max="100"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>AIモデル</label>
                    <select id="sel-ai">
                        <option value="gemini">Gemini 2.5 Flash</option>
                        <option value="azure">Azure GPT-4o (会社)</option>
                        <option value="openai">OpenAI GPT-4o-mini</option>
                        <option value="vision">Cloud Vision (高速OCR)</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="upload-area" id="drop-area">
                <div class="upload-icon">📸</div>
                <div class="upload-text">タグを撮影 / ライブラリから選択</div>
                <div class="upload-sub">複数選択・大量一括処理に対応</div>
                <input type="file" id="file-input" accept="image/*" multiple>
            </div>
            <div class="thumb-row" id="thumbs"></div>
            <button class="btn btn-dark" id="btn-analyze" disabled>
                <div class="spinner" id="sp1"></div><span id="btn-analyze-text">AIでデータを抽出する</span>
            </button>
            <div class="progress-wrap" id="prog-wrap" style="display:none">
                <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
                <div class="progress-label"><span id="prog-label">準備中...</span><span id="prog-pct">0%</span></div>
            </div>
            <div class="toast" id="toast"></div>
        </div>
        <div class="card" id="preview-card" style="display:none">
            <div class="card-title" id="preview-title">✏️ 読み取り結果（タップで修正可能）</div>
            <div class="item-cards" id="item-cards"></div>
            <div id="preview-summary-wrap"></div>
            <button class="btn btn-sm" id="btn-add-row" style="background:var(--border);color:var(--primary);margin-top:12px;width:100%">＋ 空白行を追加</button>
            <div style="margin-top:16px">
                <button class="btn btn-accent" id="btn-generate"><div class="spinner" id="sp2"></div>最終データを確定して保存</button>
            </div>
        </div>
        <div id="dl-section" style="display:none">
            <div class="card" style="text-align:center">
                <div style="font-size:32px;margin-bottom:8px">✅</div>
                <div style="font-size:15px;font-weight:700;margin-bottom:4px" id="inv-num-display"></div>
                <div style="font-size:12px;color:var(--muted);margin-bottom:16px">伝票が作成され、履歴に保存されました</div>
                <button class="btn btn-red" id="btn-pdf">📄 納品書 (PDF) をダウンロード</button>
                <button class="btn btn-green" id="btn-excel">📊 管理伝票 (Excel) をダウンロード</button>
                <div class="share-btns">
                    <button class="btn btn-sm" id="btn-line" style="background:#06c755;flex:1">📱 LINEで共有</button>
                    <button class="btn btn-sm" id="btn-email" style="background:#6b7280;flex:1">✉️ メールで送信</button>
                </div>
                <button class="btn btn-dark" id="btn-new" style="margin-top:8px">＋ 新しい伝票を作成する</button>
            </div>
        </div>
    </div>

    <!-- ========== TAB 2: HISTORY ========== -->
    <div class="page" id="page-history">
        <div class="card">
            <div class="card-title">📂 伝票履歴</div>
            <div style="margin-bottom:16px"><input type="text" id="hist-search" placeholder="伝票番号や名前で検索..." style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:16px;background:#fafafa"></div>
            <div id="hist-list"><div class="empty-state">読込中...</div></div>
        </div>
    </div>

    <!-- ========== TAB 3: DASHBOARD ========== -->
    <div class="page" id="page-dashboard">
        <div class="card">
            <div class="card-title">📊 今月の実績</div>
            <div class="stat-grid">
                <div class="stat-box"><div class="stat-val" id="dash-inv-cnt">0</div><div class="stat-label">伝票数</div></div>
                <div class="stat-box"><div class="stat-val" id="dash-inv-amt">¥0</div><div class="stat-label">合計金額</div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">📈 月別推移</div>
            <div class="bar-chart" id="bar-chart"><div class="empty-state">データがありません</div></div>
        </div>
        <div class="card">
            <div class="card-title">🤖 AI利用状況（今月）</div>
            <div id="usage-list"><div class="empty-state">まだ利用がありません</div></div>
        </div>
    </div>

    <!-- ========== TAB 4: SETTINGS ========== -->
    <div class="page" id="page-settings">
        <div class="card">
            <div class="card-title">👤 取引先マスタ</div>
            <div id="cust-list"></div>
            <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px">
                <div class="form-row">
                    <div class="form-group"><label>取引先名</label><input type="text" id="new-cust-name" placeholder="例: 株式会社 〇〇 御中"></div>
                    <div class="form-group" style="max-width:80px"><label>掛率(%)</label><input type="number" id="new-cust-rate" value="35"></div>
                </div>
                <button class="btn btn-accent btn-sm" id="btn-add-cust" style="width:100%">＋ 取引先を追加</button>
            </div>
        </div>
    </div>

    <script>
    // ===== State =====
    let selectedFiles=[], extractedItems=[], pdfData=null, excelData=null;
    let currentEditingInvId = null;
    let allHistory = [];
    const $=id=>document.getElementById(id);

    // ===== Tabs =====
    document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
        document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
        $('page-'+t.dataset.tab).classList.add('active');
        if(t.dataset.tab==='history') loadHistory();
        if(t.dataset.tab==='settings') loadCustomers();
        if(t.dataset.tab==='dashboard') loadDashboard();
    }));

    // ===== Toast =====
    const toast=(msg,type)=>{const t=$('toast');t.textContent=msg;t.className='toast toast-'+type;t.style.display='block';};

    // ===== Customers =====
    async function loadCustomers(){
        const r=await fetch('/api/customers');const data=await r.json();
        const sel=$('sel-customer'); sel.innerHTML='';
        data.forEach(c=>{const o=document.createElement('option');o.value=JSON.stringify(c);o.textContent=`${c.name} (${c.discount_rate}%)`;sel.appendChild(o);});
        const manual=document.createElement('option');manual.value='';manual.textContent='-- 手動入力 --';sel.appendChild(manual);
        const cl=$('cust-list'); cl.innerHTML='';
        if(!data.length){cl.innerHTML='<div class="empty-state">取引先が未登録です</div>';return;}
        data.forEach(c=>{
            const d=document.createElement('div');d.className='cust-item';
            d.innerHTML=`<div><strong>${c.name}</strong> <span style="color:var(--muted);font-size:12px">掛率 ${c.discount_rate}%</span></div><button class="btn btn-red btn-sm" onclick="delCust(${c.id})">削除</button>`;
            cl.appendChild(d);
        });
    }
    $('sel-customer').addEventListener('change',e=>{try{const c=JSON.parse(e.target.value);$('inp-rate').value=c.discount_rate;}catch{}});
    $('btn-add-cust').addEventListener('click',async()=>{
        const n=$('new-cust-name').value.trim(),r=$('new-cust-rate').value;
        if(!n)return;
        const fd=new FormData();fd.append('name',n);fd.append('discount_rate',r);
        await fetch('/api/customers',{method:'POST',body:fd});
        $('new-cust-name').value='';loadCustomers();
    });
    async function delCust(id){if(confirm('削除しますか？')){await fetch(`/api/customers/${id}`,{method:'DELETE'});loadCustomers();}}

    // ===== History =====
    async function loadHistory(){
        const r=await fetch('/api/history');const data=await r.json();
        allHistory = data;
        renderHistory(allHistory);
    }
    function renderHistory(data){
        const hl=$('hist-list');hl.innerHTML='';
        if(!data.length){hl.innerHTML='<div class="empty-state">伝票が見つかりません</div>';return;}
        data.forEach(inv=>{
            const d=document.createElement('div');d.className='hist-item';
            d.innerHTML=`<div class="hist-info"><div class="hist-num">${inv.invoice_number}</div><div class="hist-meta">${inv.customer_name} · ${inv.item_count}点 · ${inv.created_at?.split('T')[0]||''}</div><div class="hist-actions"><a href="/api/history/${inv.id}/pdf" class="btn btn-red btn-sm">PDF</a><a href="/api/history/${inv.id}/excel" class="btn btn-green btn-sm">Excel</a><button class="btn btn-accent btn-sm" onclick="editHist(${inv.id})">✏️ 編集</button><button class="btn btn-sm" style="background:var(--muted)" onclick="delHist(${inv.id})">削除</button></div></div><div class="hist-amt">¥${(inv.total_grand_total||0).toLocaleString()}</div>`;
            hl.appendChild(d);
        });
    }
    $('hist-search').addEventListener('input', e=>{
        const q=e.target.value.toLowerCase();
        const f=allHistory.filter(i=>i.invoice_number.toLowerCase().includes(q)||i.customer_name.toLowerCase().includes(q));
        renderHistory(f);
    });
    async function delHist(id){if(confirm('この伝票を削除しますか？')){await fetch(`/api/history/${id}`,{method:'DELETE'});loadHistory();}}
    
    async function editHist(id){
        try{
            toast('データを読み込み中...','info');
            const r=await fetch(`/api/history/${id}/items`);
            if(!r.ok) throw new Error('読込失敗');
            const d=await r.json();
            
            // Set state
            currentEditingInvId = id;
            extractedItems = d.items;
            $('preview-title').textContent = `✏️ 再編集: ${d.invoice_number}`;
            
            // Switch tab
            document.querySelectorAll('.tab')[0].click();
            $('drop-area').style.display='none';$('thumbs').style.display='none';$('btn-analyze').style.display='none';
            $('dl-section').style.display='none';
            renderPreview();
            toast('データを展開しました。修正して保存してください。','ok');
        }catch(e){toast(e.message,'err');}
    }

    // ===== File Upload =====
    $('drop-area').addEventListener('click',()=>$('file-input').click());
    $('file-input').addEventListener('change',e=>{if(e.target.files.length){Array.from(e.target.files).forEach(f=>selectedFiles.push(f));e.target.value='';renderThumbs();}});
    function renderThumbs(){
        const c=$('thumbs');c.innerHTML='';
        $('btn-analyze').disabled=!selectedFiles.length;
        $('btn-analyze-text').textContent=selectedFiles.length?`${selectedFiles.length}枚を抽出する`:'AIでデータを抽出する';
        selectedFiles.forEach((f,i)=>{const r=new FileReader();r.onload=e=>{const d=document.createElement('div');d.className='thumb-item';d.innerHTML=`<img class="thumb-img" src="${e.target.result}"><button class="thumb-x" onclick="rmFile(${i})">✕</button>`;c.appendChild(d);};r.readAsDataURL(f);});
    }
    function rmFile(i){selectedFiles.splice(i,1);renderThumbs();}

    // ===== Compress =====
    const compress=(file,mw=1200)=>new Promise((res,rej)=>{const r=new FileReader();r.readAsDataURL(file);r.onload=e=>{const img=new Image();img.src=e.target.result;img.onload=()=>{let w=img.width,h=img.height;if(w>mw){h=Math.round(h*mw/w);w=mw;}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);cv.toBlob(b=>b?res(b):rej('blob err'),'image/jpeg',.8);};img.onerror=rej;};r.onerror=rej;});
    const sleep=ms=>new Promise(r=>setTimeout(r,ms));

    // ===== Analyze =====
    $('btn-analyze').addEventListener('click',async()=>{
        if(!selectedFiles.length)return;
        $('btn-analyze').disabled=true;$('sp1').style.display='block';$('btn-analyze-text').textContent='処理中...';
        $('toast').style.display='none';extractedItems=[];$('preview-card').style.display='none';$('dl-section').style.display='none';
        const ai=$('sel-ai').value, chunk=5, total=selectedFiles.length;
        const pw=$('prog-wrap');pw.style.display='block';
        try{
            const blobs=[];
            for(let i=0;i<total;i++){updProg(`画像を圧縮中 (${i+1}/${total})`,i,total);blobs.push(await compress(selectedFiles[i]));}
            const chunks=Math.ceil(total/chunk);
            for(let c=0;c<chunks;c++){
                const cb=blobs.slice(c*chunk,(c+1)*chunk);
                updProg(`AI解析中 (${c+1}/${chunks})`,c,chunks);
                let ok=false,retry=0;
                while(!ok&&retry<1){
                    const fd=new FormData();fd.append('ai_model',ai);cb.forEach((b,j)=>fd.append('files',b,`i_${c}_${j}.jpg`));
                    const r=await fetch('/analyze-images',{method:'POST',body:fd});
                    if(r.status===429){retry++;toast('AI混雑中。10秒後に再試行..','err');await sleep(10000);continue;}
                    if(!r.ok){const e=await r.json();throw new Error(e.detail||'APIエラー');}
                    const d=await r.json();extractedItems.push(...d.items);ok=true;
                }
                if(!ok)throw new Error('無料枠上限です。AIモデルを切り替えてください。');
            }
            updProg('完了',1,1);
            // Merge duplicates
            const merged = {};
            extractedItems.forEach(it => {
                const key = `${it.code}|${it.color}|${it.size}|${it.unit_price}`;
                const qty = parseInt(it.quantity) || 1;
                if (merged[key]) { merged[key].quantity += qty; }
                else { merged[key] = {...it, quantity: qty}; }
            });
            extractedItems = Object.values(merged);
            toast(`🎉 ${total}枚の解析完了！${extractedItems.length}件に集約しました`,'ok');
            $('drop-area').style.display='none';$('thumbs').style.display='none';$('btn-analyze').style.display='none';
            pw.style.display='none';
            $('preview-title').textContent = '✏️ 読み取り結果（タップで修正可能）';
            renderPreview();
        }catch(e){console.error(e);toast(e.message,'err');$('btn-analyze').disabled=false;$('sp1').style.display='none';$('btn-analyze-text').textContent='再試行';}
    });
    function updProg(label,cur,tot){$('prog-label').textContent=label;const p=Math.round(cur/tot*100);$('prog-pct').textContent=p+'%';$('prog-fill').style.width=p+'%';}

    // ===== Preview Cards =====
    function getRate(){ return parseInt($('inp-rate').value)||35; }
    function calcItemAmount(it){ const q=parseInt(it.quantity)||1; const u=parseInt(it.unit_price)||0; return Math.floor(u*(getRate()/100)*q); }

    function renderPreview(){
        const container=$('item-cards'); container.innerHTML='';
        const rate=getRate();
        let totalNet=0;
        extractedItems.forEach((it,i)=>{
            const amt=calcItemAmount(it);
            totalNet+=amt;
            const card=document.createElement('div'); card.className='item-card'; card.dataset.idx=i;
            card.innerHTML=`
                <div class="item-card-header">
                    <span class="item-card-num">#${i+1}</span>
                    <button class="item-card-del" onclick="delRow(${i})" title="削除">✕</button>
                </div>
                <div class="item-card-body">
                    <div class="item-field full"><label>品番</label><input value="${it.code||''}" data-i="${i}" data-k="code" placeholder="例: 148-3101"></div>
                    <div class="item-field"><label>カラー</label><input value="${it.color||''}" data-i="${i}" data-k="color" placeholder="例: 24"></div>
                    <div class="item-field"><label>サイズ</label><input value="${it.size||''}" data-i="${i}" data-k="size" placeholder="例: 46"></div>
                    <div class="item-field"><label>数量</label><input type="number" value="${it.quantity||1}" data-i="${i}" data-k="quantity" min="1" inputmode="numeric"></div>
                    <div class="item-field"><label>単価 (税抜)</label><input type="number" value="${it.unit_price||0}" data-i="${i}" data-k="unit_price" min="0" inputmode="numeric"></div>
                </div>
                <div class="item-card-footer">
                    <span class="item-card-price">${rate}% × ${(parseInt(it.quantity)||1)}点</span>
                    <span class="item-card-total">¥${amt.toLocaleString()}</span>
                </div>`;
            container.appendChild(card);
        });
        // Live update on input change
        container.querySelectorAll('input').forEach(inp=>{
            inp.addEventListener('input',()=>{
                const i=parseInt(inp.dataset.idx||inp.dataset.i);
                const k=inp.dataset.k;
                let v=inp.value;
                if(k==='unit_price'||k==='quantity') v=parseInt(v)||0;
                extractedItems[i][k]=v;
                updateCardFooter(i);
                updateSummary();
            });
        });
        updateSummary();
        $('preview-card').style.display='block';
    }
    function updateCardFooter(i){
        const cards=$('item-cards').children;
        if(!cards[i]) return;
        const it=extractedItems[i];
        const amt=calcItemAmount(it);
        const footer=cards[i].querySelector('.item-card-footer');
        if(footer){
            footer.querySelector('.item-card-price').textContent=`${getRate()}% × ${parseInt(it.quantity)||1}点`;
            footer.querySelector('.item-card-total').textContent=`¥${amt.toLocaleString()}`;
        }
    }
    function updateSummary(){
        const rate=getRate();
        let totalNet=0;
        extractedItems.forEach(it=>{ totalNet+=calcItemAmount(it); });
        const tax=Math.floor(totalNet*0.1);
        const grand=totalNet+tax;
        $('preview-summary-wrap').innerHTML=`
            <div class="preview-summary">
                <div class="preview-summary-row"><span>小計 (${extractedItems.length}件)</span><span>¥${totalNet.toLocaleString()}</span></div>
                <div class="preview-summary-row"><span>消費税 (10%)</span><span>¥${tax.toLocaleString()}</span></div>
                <div class="preview-summary-row total"><span>合計</span><span>¥${grand.toLocaleString()}</span></div>
            </div>`;
    }
    function delRow(i){
        syncInputs();
        extractedItems.splice(i,1);
        renderPreview();
    }
    function syncInputs(){
        $('item-cards').querySelectorAll('input').forEach(inp=>{
            const i=inp.dataset.i,k=inp.dataset.k;
            let v=inp.value;
            if(k==='unit_price'||k==='quantity') v=parseInt(v)||0;
            extractedItems[i][k]=v;
        });
    }
    $('btn-add-row').addEventListener('click',()=>{
        syncInputs();
        extractedItems.push({code:'',color:'',size:'',quantity:1,unit_price:0});
        renderPreview();
    });

    // ===== Generate =====
    $('btn-generate').addEventListener('click',async()=>{
        $('btn-generate').disabled=true;$('sp2').style.display='block';$('toast').style.display='none';
        syncInputs();
        let cn='';try{cn=JSON.parse($('sel-customer').value).name;}catch{cn=$('sel-customer').options[$('sel-customer').selectedIndex]?.textContent?.replace(/ \(\d+%\)/,'')||'取引先不明';}
        const payload={invoice_id:currentEditingInvId, customer_name:cn,discount_rate:parseInt($('inp-rate').value)||35,items:extractedItems};
        try{
            toast('PDF・Excelを生成中...','info');
            const r=await fetch('/generate-documents',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
            if(!r.ok){const e=await r.json();throw new Error(e.detail);}
            const d=await r.json();pdfData=d.pdf_base64;excelData=d.excel_base64;
            currentInvNum=d.invoice_number;
            $('inv-num-display').textContent=`伝票番号: ${d.invoice_number}`;
            $('preview-card').style.display='none';$('dl-section').style.display='block';
            toast('✨ 保存完了！','ok');
        }catch(e){toast(e.message,'err');$('btn-generate').disabled=false;$('sp2').style.display='none';}
    });

    let currentInvNum = '';

    // ===== Download =====
    function dl64(b64,fn,ct){try{const c=atob(b64.replace(/\s/g,''));const a=[];for(let o=0;o<c.length;o+=512){const s=c.slice(o,o+512);const n=new Array(s.length);for(let i=0;i<s.length;i++)n[i]=s.charCodeAt(i);a.push(new Uint8Array(n));}const b=new Blob(a,{type:ct});const u=URL.createObjectURL(b);const l=document.createElement('a');l.href=u;l.download=fn;l.click();URL.revokeObjectURL(u);}catch(e){toast('保存エラー: '+e.message,'err');}}
    $('btn-pdf').addEventListener('click',()=>pdfData&&dl64(pdfData,'LAURA_JAPAN_invoice.pdf','application/pdf'));
    $('btn-excel').addEventListener('click',()=>excelData&&dl64(excelData,'LAURA_JAPAN_data.xlsx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'));
    $('btn-new').addEventListener('click',()=>{currentEditingInvId=null;selectedFiles=[];extractedItems=[];pdfData=null;excelData=null;$('drop-area').style.display='';$('thumbs').innerHTML='';$('thumbs').style.display='';$('btn-analyze').style.display='';$('btn-analyze').disabled=true;$('btn-analyze-text').textContent='AIでデータを抽出する';$('sp1').style.display='none';$('preview-card').style.display='none';$('dl-section').style.display='none';$('toast').style.display='none';$('btn-generate').disabled=false;$('sp2').style.display='none';});

    // ===== LINE / Email Share =====
    $('btn-line').addEventListener('click',()=>{
        const msg = `【LAURA JAPAN 納品書】\n伝票番号: ${currentInvNum}\n※ PDFはアプリからダウンロードしてください`;
        window.open(`https://line.me/R/share?text=${encodeURIComponent(msg)}`);
    });
    $('btn-email').addEventListener('click',()=>{
        const subj = `LAURA JAPAN 納品書 [${currentInvNum}]`;
        const body = `伝票番号: ${currentInvNum}\n\n※ PDF/Excelはアプリからダウンロードしてください。`;
        window.location.href = `mailto:?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
    });

    // ===== Dashboard =====
    async function loadDashboard(){
        try{
            const r=await fetch('/api/dashboard');const d=await r.json();
            $('dash-inv-cnt').textContent=d.this_month.invoices;
            $('dash-inv-amt').textContent='¥'+d.this_month.total_amount.toLocaleString();
            // Bar chart
            const bc=$('bar-chart');bc.innerHTML='';
            if(d.monthly.length){
                const max=Math.max(...d.monthly.map(m=>m.total),1);
                d.monthly.reverse().forEach(m=>{
                    const col=document.createElement('div');col.className='bar-col';
                    const h=Math.max(4,Math.round(m.total/max*100));
                    col.innerHTML=`<div class="bar" style="height:${h}px"></div><div class="bar-label">${m.month.slice(5)}月</div>`;
                    bc.appendChild(col);
                });
            } else { bc.innerHTML='<div class="empty-state">データがありません</div>'; }
            // Usage
            const ul=$('usage-list');ul.innerHTML='';
            if(d.api_usage.length){
                d.api_usage.forEach(u=>{
                    const row=document.createElement('div');row.className='usage-row';
                    row.innerHTML=`<span><strong>${u.model}</strong> (${u.requests}回 / ${u.images}枚)</span><span>推定 ¥${u.est_cost_yen}</span>`;
                    ul.appendChild(row);
                });
            } else { ul.innerHTML='<div class="empty-state">まだ利用がありません</div>'; }
        }catch(e){console.error(e);}
    }

    // ===== Keep-Alive (prevent Render free tier sleep) =====
    setInterval(()=>{fetch('/health').catch(()=>{});}, 5*60*1000); // every 5 min

    // ===== Init =====
    loadCustomers();
    </script>
</body>
</html>
