<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAURA JAPAN | 納品書・伝票作成</title>
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #666;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.2em;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 40px 20px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:active {
            background-color: #f0f0f0;
            border-color: var(--accent-color);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .upload-text {
            font-size: 14px;
            color: var(--accent-color);
        }

        #file-input {
            display: none;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-pdf { background-color: #d32f2f; }
        .btn-excel { background-color: #1d6f42; }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #status-msg {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
        }

        .preview-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-top: 20px;
            padding-bottom: 10px;
        }

        .preview-img {
            height: 80px;
            width: auto;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        #download-section {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">LAURA JAPAN</div>
        
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <span class="upload-icon">📸</span>
            <span class="upload-text" id="file-label">複数のタグを撮影または選択</span>
            <input type="file" id="file-input" accept="image/*" capture="environment" multiple>
            <div id="preview-container" class="preview-container"></div>
        </div>

        <button id="upload-btn" class="btn" disabled>
            <div class="loading-spinner" id="spinner"></div>
            <span id="btn-text">データを作成する</span>
        </button>
        
        <div id="download-section">
            <button id="btn-dl-pdf" class="btn btn-pdf">📄 納品書 (PDF) を保存</button>
            <button id="btn-dl-excel" class="btn btn-excel">📊 管理伝票 (Excel) を保存</button>
        </div>

        <div id="status-msg"></div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('spinner');
        const statusMsg = document.getElementById('status-msg');
        const fileLabel = document.getElementById('file-label');
        const previewContainer = document.getElementById('preview-container');
        const downloadSection = document.getElementById('download-section');
        const btnDlPdf = document.getElementById('btn-dl-pdf');
        const btnDlExcel = document.getElementById('btn-dl-excel');

        let currentPdfData = null;
        let currentExcelData = null;

        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files.length > 0) {
                const files = Array.from(e.target.files);
                fileLabel.textContent = `${files.length}枚のタグを選択中`;
                uploadBtn.disabled = false;
                downloadSection.style.display = 'none';
                statusMsg.textContent = '';
                
                previewContainer.innerHTML = '';
                
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (re) => {
                        const img = document.createElement('img');
                        img.src = re.target.result;
                        img.className = 'preview-img';
                        previewContainer.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                });
            }
        });

        const downloadBase64File = (base64Data, filename, contentType) => {
            const byteCharacters = atob(base64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], {type: contentType});
            
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
        };

        btnDlPdf.addEventListener('click', () => {
            if(currentPdfData) downloadBase64File(currentPdfData, 'LAURA_JAPAN_invoice.pdf', 'application/pdf');
        });

        btnDlExcel.addEventListener('click', () => {
            if(currentExcelData) downloadBase64File(currentExcelData, 'LAURA_JAPAN_data.xlsx', 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
        });

        uploadBtn.addEventListener('click', async () => {
            const files = fileInput.files;
            if (files.length === 0) return;

            const formData = new FormData();
            Array.from(files).forEach(file => {
                formData.append('files', file);
            });

            uploadBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = 'AIが解析中...';
            statusMsg.textContent = '画像をサーバーに送信し、AIで読み取っています...（枚数が多いと数分かかります）';
            statusMsg.style.color = '#666';
            downloadSection.style.display = 'none';

            try {
                const response = await fetch('/generate-documents', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'ファイルの生成に失敗しました');
                }

                const data = await response.json();
                
                currentPdfData = data.pdf_base64;
                currentExcelData = data.excel_base64;
                
                statusMsg.textContent = '成功しました！下のボタンから保存してください。';
                statusMsg.style.color = 'green';
                downloadSection.style.display = 'block';
                uploadBtn.style.display = 'none';
                
            } catch (error) {
                console.error(error);
                statusMsg.textContent = `エラー: ${error.message}`;
                statusMsg.style.color = 'red';
            } finally {
                uploadBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'データを作成する';
                if(statusMsg.style.color !== 'green') {
                    uploadBtn.style.display = 'flex';
                }
            }
        });
    </script>
</body>
</html>
